name: sunoh
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.7.1+23

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  go_router: ^17.2.3
  smooth_corner: ^1.1.1
  dio: ^5.9.2
  flutter_riverpod: ^3.3.1
  cached_network_image: ^3.4.1
  palette_generator: ^0.3.3+6
  # Audio engine — libmpv-based, gives us DSP/EQ/gapless. The native libs
  # are heavy (~10–15 MB to APK) but acceptable for this private app.
  mpv_audio_kit: ^0.2.1
  # OS integration: lockscreen, notification, headset, audio focus. ADDITIVE
  # — if init fails or hangs, in-app playback (Phase 1) still works.
  audio_service: ^0.18.18
  # Audio focus + interruption + becoming-noisy events. audio_service uses
  # this transitively but we need the public API to wire ducking / pause
  # on phone calls + headphone unplug.
  audio_session: ^0.2.3
  # Runtime POST_NOTIFICATIONS request on Android 13+.
  permission_handler: ^12.0.1
  # Local persistence — RN's MMKV equivalent in the Flutter ecosystem. Pure
  # Dart (no native deps), object-friendly, fast. We use separate boxes per
  # concern: 'playback' (queue/index/position), and later 'library' /
  # 'history' / 'settings'.
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.1
  # The music APIs sometimes return HTML-escaped text in titles/subtitles
  # (e.g. "Mama&#39;s Boy"). Decode once at parse time so the UI never sees
  # the entities.
  html_unescape: ^2.0.0
  # Solar icon set — replaces Material icons everywhere for a consistent
  # outline-style aesthetic. Use SolarIconsOutline by default and
  # SolarIconsBold for active/selected states.
  solar_icons: ^0.0.5
  # Phosphor for the playback controls (play/pause/skip/shuffle/repeat).
  # Solar's filled play/pause looked off — Phosphor's Fill weight has
  # better proportions for media buttons. Used ONLY for transport icons;
  # everything else stays on Solar.
  phosphor_flutter: ^2.1.0
  # Used by the Settings → Support sunoh. card for the UPI deep link
  # (upi://pay?pa=…) + the Buy Me A Coffee URL fallback. canLaunchUrl
  # gracefully reports when no UPI app is installed so we can fall back
  # to copying the VPA to the clipboard.
  url_launcher: ^6.3.2
  # Inbound deep links. Surfaces both `sunoh://` (custom scheme) and
  # `https://sunoh.online/*` (App Links) through one stream + the
  # initial cold-start URI. See `lib/router/deep_links.dart` for the
  # dispatch + `android/app/src/main/AndroidManifest.xml` intent filters.
  app_links: ^6.4.1
  # Outbound — opens the OS share sheet so the user can hand off a
  # sunoh.online deep-link to any app (WhatsApp, mail, copy, etc.).
  # See `lib/share/share_link.dart` for the helper that pairs with this.
  share_plus: ^11.1.0
  # Used by `lib/audio/storage_stats.dart` to summarise Hive + image-
  # cache bytes for the Settings → Storage row. Transitive via several
  # other packages; declared directly so the storage helper doesn't rely
  # on lint-flagged hidden imports.
  flutter_cache_manager: ^3.4.1
  path_provider: ^2.1.4
  # Reads versionName/versionCode from the running APK so the in-app
  # update notifier (`lib/api/updates.dart`) can compare against the
  # JSON published at https://sunoh.online/.well-known/sunoh-updates.json.
  package_info_plus: ^8.1.2
  # Conceptually a dev-only generator (only its `dart run
  # flutter_native_splash:create` matters to us, splash assets are
  # already committed under android/app/src/main/res/). Listed here in
  # `dependencies` rather than `dev_dependencies` because v2.4.7 declares
  # itself as an Android plugin (`pluginClass: FlutterNativeSplashPlugin`)
  # and Flutter 3.41 injects its registration into
  # GeneratedPluginRegistrant.java even with `dev_dependency: true` — but
  # Gradle drops the .aar from the release classpath, breaking the build
  # with `package net.jonhanson.flutter_native_splash does not exist`.
  # Adds ~10 KB of unused runtime code to the APK; the bigger cost was
  # the broken release build. Re-evaluate when Flutter SDK fixes the
  # dev_dependency exclusion path.
  flutter_native_splash: ^2.4.6
  # Google Cast SDK wrapper. Used by `lib/cast/cast_service.dart` to
  # discover Cast devices on the LAN + remote-control a Cast session
  # (load media, play/pause/seek, position stream). The Cast device
  # fetches the URL itself, so mpv goes silent during a cast session;
  # AudioRepo routes transport commands to whichever backend currently
  # owns playback. Requires Google Play Services on the phone — devices
  # without GApps can't cast.
  flutter_chrome_cast: ^1.4.6
  # Firebase Analytics — mirrors the RN app's setup, scope-limited to
  # event tracking (no Crashlytics / RC / Messaging). The Dart-side init
  # in `main.dart` is wrapped in try/catch so a missing
  # `android/app/google-services.json` degrades to "analytics disabled"
  # instead of a crash; the Gradle plugin in
  # android/app/build.gradle.kts is similarly conditional. See
  # `lib/services/analytics_service.dart` for the surface.
  firebase_core: ^4.2.0
  firebase_analytics: ^12.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  # Pure-Dart CLI generator (no plugin declaration), safe to keep as a
  # dev-only dep. Re-run via:
  #   dart run flutter_launcher_icons
  # after touching the master assets/icon/icon.png.
  flutter_launcher_icons: ^0.14.4

# ── App icon (flutter_launcher_icons) ────────────────────────────────────────
# Master: assets/icon/icon.png (1:1, ported from the RN ic_launcher-playstore).
# Adaptive icon background matches the design-system bg so the icon reads
# clean on Android 8+ adaptive icon shapes.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0B0B0D"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21

# ── Splash (flutter_native_splash) ───────────────────────────────────────────
# Logo centered on the design-system bg. flutter_native_splash sizes the
# image at its native pixel dimensions; to make the icon visually smaller
# we use a pre-padded asset (`splash.png` = 1536×1536 canvas with the
# 512×512 icon centered, ~33% of canvas width). The launcher icon keeps
# using the full-bleed `icon.png` so the home-screen launcher tile stays
# correctly cropped.
flutter_native_splash:
  color: "#0B0B0D"
  image: "assets/icon/splash.png"
  android: true
  ios: true
  android_12:
    color: "#0B0B0D"
    image: "assets/icon/splash.png"
    icon_background_color: "#0B0B0D"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Bundled fonts — shipped in the app so they load instantly, offline, with no
  # runtime network fetch. Family names match SunohFonts in lib/theme/tokens.dart.
  fonts:
    - family: Gilroy
      fonts:
        - asset: assets/fonts/Gilroy-Regular.ttf
          weight: 400
        - asset: assets/fonts/Gilroy-Medium.ttf
          weight: 500
        - asset: assets/fonts/Gilroy-Semibold.ttf
          weight: 600
        - asset: assets/fonts/Gilroy-Bold.ttf
          weight: 700
        - asset: assets/fonts/Gilroy-Extrabold.ttf
          weight: 800

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
